blueprint:
  name: Solar Battery Status
  description: >
    Displays the battery charge level of your solar/PV battery on the AWTRIX or
    SVITRIX LED display.

    Shows battery percentage with color-coded icons and progress bar:
      - Green: High charge (above high threshold)
      - Yellow: Medium charge (between high and low threshold)
      - Red: Low charge (below low threshold)

    Required icons must be installed on your display:
      - 6358: battery full
      - 6356: battery medium
      - 6354: battery empty

    By https://github.com/foundnobetter/ha-blueprints, based on blueprint by blueforcer.
  domain: automation
  input:
    awtrix:
      name: AWTRIX / SVITRIX Device
      description: Select your AWTRIX or SVITRIX LED display device(s) to show the battery data on
      selector:
        device:
          filter:
            - integration: mqtt
              manufacturer: Blueforcer
          multiple: true
    battery_sensor:
      name: Battery Level Sensor
      description: Choose the Home Assistant sensor that measures your battery charge level (in percent)
      selector:
        entity:
          filter:
            - domain:
                - sensor
          multiple: false
    threshold_high:
      name: High Charge Threshold (%)
      description: "Battery level above this percentage = green icon (good charge). Between this and low threshold = yellow. Default: 50%"
      default: 50
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"
          mode: slider
          step: 1
    threshold_low:
      name: Low Charge Threshold (%)
      description: "Battery level below this percentage = red icon (low charge). Above this but below high threshold = yellow. Default: 20%"
      default: 20
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"
          mode: slider
          step: 1
    app_position:
      name: Display position
      description: Position in the display rotation cycle (1-20). Leave at 0 for automatic positioning
      default: 0
      selector:
        number:
          min: 0
          max: 20
          step: 1

mode: single

variables:
  device_ids: !input awtrix
  devices_topics: >-
    {%- macro get_device_topic(device_id) %}
      {{ states((device_entities(device_id) | select('search','device_topic') | list)[0]) }}
    {%- endmacro %}
    {%- set ns = namespace(devices=[]) %}
    {%- for device_id in device_ids %}
      {%- set device = get_device_topic(device_id) | replace(' ','') %}
      {%- set ns.devices = ns.devices + [ device ~ '/custom/solar_battery'] %}
    {%- endfor %}
    {{ ns.devices }}
  battery_sensor: !input battery_sensor
  threshold_high: !input threshold_high
  threshold_low: !input threshold_low
  app_position: !input app_position
  payload: >-
    {%- set soc = states[battery_sensor].state | int(0) %}
    {%- set t_high = threshold_high | int(50) %}
    {%- set t_low = threshold_low | int(20) %}
    {%- if soc > t_high %}
      {%- set icon = 6358 %}
      {%- set color = "#00ff00" %}
    {%- elif soc > t_low %}
      {%- set icon = 6356 %}
      {%- set color = "#ffaa00" %}
    {%- else %}
      {%- set icon = 6354 %}
      {%- set color = "#ff0000" %}
    {%- endif %}
    {%- if app_position > 0 %}
      {%- set payload_obj = {"icon": icon | string, "text": soc | string ~ "%", "color": color, "progress": soc, "progressC": color, "progressBC": "#000000", "lifetime": 360, "pos": app_position} %}
    {%- else %}
      {%- set payload_obj = {"icon": icon | string, "text": soc | string ~ "%", "color": color, "progress": soc, "progressC": color, "progressBC": "#000000", "lifetime": 360} %}
    {%- endif %}
    {{ payload_obj | to_json }}

triggers:
  - entity_id: !input battery_sensor
    trigger: state
  - minutes: /5
    trigger: time_pattern

condition: []

action:
  - repeat:
      for_each: "{{ devices_topics }}"
      sequence:
        - action: mqtt.publish
          data:
            qos: 0
            retain: true
            topic: "{{ repeat.item }}"
            payload: "{{ payload }}"
